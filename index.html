<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX 商業案例分享</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light;
    --bg:#EEF1F5;
    --glass:rgba(255,255,255,.62);
    --glass-strong:rgba(255,255,255,.8);
    --ink:#1A1E2B; --ink2:#646B7A; --ink3:#9AA1B0;
    --navy:#171B29;
    --lime:#D7F16B; --lime-soft:rgba(215,241,107,.32); --lime-ink:#4A5417;
    --stroke:rgba(23,27,41,.06);
    --t1-bg:#DCF1E8; --t1-fg:#1E6B54;
    --t2-bg:#DFE9F6; --t2-fg:#2F5787;
    --t3-bg:#E9E2F6; --t3-fg:#5D468F;
    --t4-bg:#F6E9DC; --t4-fg:#8A5A2A;
    --reject:#A05543;
    --r-card:28px; --r-inner:16px;
    --sh-card:0 1px 2px rgba(23,27,41,.04), 0 12px 32px -8px rgba(23,27,41,.10);
    --sh-hover:0 2px 4px rgba(23,27,41,.05), 0 20px 44px -8px rgba(23,27,41,.14);
    --ease:180ms cubic-bezier(.2,.7,.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    color:var(--ink);
    font-family:"Inter","Noto Sans TC","PingFang TC",-apple-system,sans-serif;
    line-height:1.75;-webkit-font-smoothing:antialiased;letter-spacing:1px;
    background:var(--bg);min-height:100vh;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(900px 600px at 12% -5%, #DCE6EE 0%, transparent 60%),
      radial-gradient(800px 640px at 95% 12%, #E7E2F4 0%, transparent 62%),
      radial-gradient(900px 700px at 55% 108%, #F3E8EC 0%, transparent 60%),
      var(--bg);
  }
  .wrap{width:80%;max-width:1500px;margin:0 auto;padding:44px 0 96px}

  .header-grid{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;flex-wrap:wrap}
  .header-left{flex:1 1 480px;min-width:280px}
  .eyebrow{display:inline-flex;align-items:center;background:var(--navy);border:1px solid transparent;box-shadow:0 6px 16px -6px rgba(23,27,41,.38);border-radius:999px;padding:5px 11px;font-size:11px;font-weight:800;letter-spacing:.12em;color:#fff;line-height:1}
  h1{font-size:40px;font-weight:900;letter-spacing:2px;line-height:1.2;margin-top:12px}
  .sub{color:var(--ink2);font-size:15px;margin-top:12px;max-width:760px;line-height:1.7}

  .stats{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;margin-top:8px}
  .stat{
    background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.65);
    border-radius:20px;padding:16px 24px;min-width:132px;
  }
  .stat b{display:block;font-size:28px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.2}
  .stat span{font-size:12px;color:var(--ink3);font-weight:500}
  .stat.hero{position:relative;overflow:hidden}
  .stat.hero::after{content:"";position:absolute;right:-18px;top:-18px;width:64px;height:64px;border-radius:50%;background:var(--lime-soft)}

  /* 吸頂區：主選單＋次選單一起置頂。吸頂時，背景延伸至視窗頂部與左右邊界。 */
  .sticky-head{
    --sticky-top:16px;
    position:sticky;top:var(--sticky-top);z-index:20;isolation:isolate;
    margin:30px 0 30px;
  }
  .sticky-head::before{content:none}
  /* 僅在手機吸頂狀態顯示，避免桌機／平板誤出現在主選單內。 */
  .mobile-sticky-filter{display:none}
  .sticky-head.stuck::before{
    content:"";position:absolute;z-index:-1;pointer-events:none;
    top:calc(-1 * var(--sticky-top));bottom:calc(-1 * var(--sticky-top));
    left:calc((100vw - 100%) / -2);right:calc((100vw - 100%) / -2);
    background:rgba(238,241,245,.78);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-bottom:1px solid rgba(23,27,41,.06);
    box-shadow:0 10px 26px -18px rgba(23,27,41,.24);
  }
  .toolbar-row{display:flex;align-items:center;gap:12px}
  /* 開啟進階篩選時，保留原導覽脈絡，但讓它退到半透模糊背景。 */
  .sticky-head.adv-open .toolbar,
  .sticky-head.adv-open .tools > :not(.adv-anchor),
  .sticky-head.adv-open .submenu-wrap{opacity:.38;filter:blur(3px);pointer-events:none}
  /* 進階篩選開啟時：popup 外半透明模糊遮罩，點擊即取消返回 */
  .adv-backdrop{position:fixed;inset:0;z-index:15;background:rgba(238,241,245,.4);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
  .adv-backdrop[hidden]{display:none}
  .toolbar{
    display:flex;gap:6px;flex-wrap:wrap;align-items:center;
    background:var(--glass-strong);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.7);
    border-radius:999px;padding:8px;
    transition:border-radius .2s ease;
  }
  /* 右側工具列：進階篩選 / 排序 / 排版方式 */
  .tools{display:flex;gap:8px;align-items:center;margin-left:auto}
  .adv-anchor,.sort-anchor{position:relative;flex:0 0 auto}
  .icon-btn{
    display:inline-flex;align-items:center;justify-content:center;width:41px;height:41px;cursor:pointer;font-family:inherit;
    background:var(--glass-strong);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.7);
    border-radius:999px;color:var(--ink2);transition:var(--ease);
  }
  .icon-btn svg{display:block}
  .icon-btn:hover{color:var(--ink)}
  .icon-btn.on{background:var(--navy);color:#fff;border-color:transparent;box-shadow:0 6px 16px -4px rgba(23,27,41,.4)}
  .menu-pop{position:absolute;top:calc(100% + 8px);right:0;z-index:60;background:#fff;border:1px solid var(--stroke);
    box-shadow:0 8px 20px -6px rgba(23,27,41,.16), 0 20px 44px -16px rgba(23,27,41,.34);border-radius:14px;padding:6px;
    display:flex;flex-direction:column;gap:2px;min-width:132px}
  .menu-pop[hidden]{display:none}
  .pop-item{text-align:left;border:none;background:transparent;border-radius:9px;padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;justify-content:space-between;gap:14px;align-items:center}
  .pop-item:hover{background:rgba(23,27,41,.05);color:var(--ink)}
  .pop-item.on{background:var(--navy);color:#fff}
  .pop-item .pi-sub{font-size:11px;opacity:.6;font-weight:500}
  .adv-toggle{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit;white-space:nowrap;
    background:var(--glass-strong);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.7);
    border-radius:999px;padding:9px 16px;font-size:13.5px;font-weight:700;color:var(--ink2);transition:var(--ease);
  }
  .adv-toggle svg{display:block}
  .adv-toggle:hover{color:var(--ink)}
  .adv-toggle.on{background:var(--navy);color:#fff;border-color:transparent;box-shadow:0 6px 16px -4px rgba(23,27,41,.4)}
  .chip{
    border:none;background:transparent;border-radius:999px;
    padding:8px 18px;font-size:13.5px;font-weight:600;color:var(--ink2);
    cursor:pointer;transition:var(--ease);font-family:inherit;
  }
  .chip:hover{color:var(--ink);background:rgba(23,27,41,.05)}
  .chip.on{background:var(--navy);color:#fff;box-shadow:0 6px 16px -4px rgba(23,27,41,.4)}
  .chip.more{display:inline-flex;align-items:center;gap:4px}
  .chip.more .caret{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;opacity:.72;line-height:0;transition:transform var(--ease)}
  .chip.more .caret svg{display:block}
  .chip.more[aria-expanded="true"] .caret{transform:rotate(180deg)}

  /* 產業次選單：單列可橫向捲動的 hashtag（Mobile First，仿 YouTube 分類列）*/
  .submenu-wrap{margin:10px 0 0}
  .submenu{
    display:flex;gap:8px;overflow-x:auto;padding:10px 4px 10px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x proximity;
  }
  .submenu::-webkit-scrollbar{display:none}
  .subchip{
    flex:0 0 auto;white-space:nowrap;scroll-snap-align:start;
    border:1px solid var(--stroke);
    background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);
    border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--ink2);
    cursor:pointer;font-family:inherit;transition:var(--ease);
  }
  .subchip:hover{color:var(--ink);background:rgba(23,27,41,.05)}
  .subchip.on{background:var(--navy);color:#fff;border-color:transparent;box-shadow:0 6px 16px -4px rgba(23,27,41,.4)}

  /* ---------- 進階篩選 icon 按鈕 ---------- */
  .chip.adv-btn{display:inline-flex;align-items:center;gap:6px}
  .chip.adv-btn svg{display:block}
  .chip-div{width:1px;height:20px;background:var(--stroke);margin:0 3px;align-self:center;flex:0 0 auto}
  .advbadge{background:var(--lime);color:var(--lime-ink);border-radius:999px;font-size:11px;font-weight:800;min-width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;font-variant-numeric:tabular-nums}
  .chip.adv-btn.on .advbadge{background:#fff;color:var(--navy)}

  /* ---------- 進階篩選面板（懸浮，不推擠文章）---------- */
  .adv-wrap{position:absolute;top:calc(100% + 10px);right:0;width:min(600px,86vw);z-index:60}
  .adv{
    background:#fff;
    border:1px solid var(--stroke);box-shadow:0 8px 20px -6px rgba(23,27,41,.16), 0 28px 60px -20px rgba(23,27,41,.4), inset 0 0 0 1px rgba(255,255,255,.7);
    border-radius:22px;padding:20px 22px 0;display:flex;flex-direction:column;gap:18px;
    max-height:min(70vh,620px);overflow-y:auto;
  }
  .adv-h{font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--ink);margin-bottom:12px}
  .adv-sub{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:10px}
  .adv-sub-h{font-size:11.5px;font-weight:700;color:var(--ink3);min-width:34px;letter-spacing:.06em}
  .adv-chips{display:flex;flex-wrap:wrap;gap:8px}
  .adv-chip{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit;
    border:1px solid var(--stroke);background:rgba(255,255,255,.6);
    border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--ink2);transition:var(--ease);
  }
  .adv-chip:hover{color:var(--ink);background:rgba(255,255,255,.9);box-shadow:var(--sh-card)}
  .adv-chip.on{background:var(--navy);color:#fff;border-color:transparent;box-shadow:0 6px 16px -4px rgba(23,27,41,.4)}
  .adv-chip .cnt{font-size:10.5px;font-weight:800;color:var(--ink3);background:rgba(23,27,41,.06);border-radius:999px;padding:1px 6px;font-variant-numeric:tabular-nums}
  .adv-chip.on .cnt{color:#fff;background:rgba(255,255,255,.22)}
  .adv-chip.zero{opacity:.42}
  .adv-foot{position:sticky;bottom:0;z-index:2;flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fff;border-top:1px solid var(--stroke);box-shadow:0 -10px 16px rgba(255,255,255,.96);margin:8px -22px 0;padding:14px 22px 18px;border-radius:0 0 22px 22px}
  .adv-foot-r{display:flex;gap:10px;align-items:center;margin-left:auto}
  .adv-clear-mini{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit;border:none;background:transparent;color:var(--ink3);font-size:12.5px;font-weight:700;padding:6px 4px;transition:var(--ease)}
  .adv-clear-mini:hover{color:var(--ink2)}
  .adv-clear-mini svg{display:block}
  .adv-cancel{cursor:pointer;font-family:inherit;border:1px solid var(--stroke);background:rgba(255,255,255,.7);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:700;color:var(--ink2);transition:var(--ease)}
  .adv-cancel:hover{color:var(--ink);box-shadow:var(--sh-card)}
  .adv-apply{cursor:pointer;font-family:inherit;border:none;background:var(--navy);color:#fff;border-radius:999px;padding:9px 20px;font-size:13px;font-weight:700;box-shadow:0 6px 16px -4px rgba(23,27,41,.4);transition:var(--ease);font-variant-numeric:tabular-nums}
  .adv-apply:hover:not([disabled]){transform:translateY(-1px)}
  .adv-apply[disabled]{opacity:.38;cursor:default;box-shadow:none}
  @media (max-width:640px){
    .adv-toggle .adv-btn-t{display:none}
    .adv-wrap{position:fixed;left:12px;right:12px;bottom:12px;top:auto;width:auto}
    .adv{padding:16px 16px 0;max-height:76vh;overscroll-behavior:contain}
    .adv-foot{margin:8px -16px 0;padding:14px 16px calc(18px + env(safe-area-inset-bottom));border-radius:0 0 22px 22px}
  }

  .card{
    background:rgba(255,255,255,.86);
    border:1px solid var(--stroke);
    box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.65);
    border-radius:var(--r-card);padding:30px 34px;margin-bottom:26px;
    transition:var(--ease);
  }
  .card:hover{box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.65)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes filterIn{from{opacity:0;transform:translateX(10px) scale(.88)}to{opacity:1;transform:translateX(0) scale(1)}}
  .card.enter{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}

  /* ---------- 圖片：精簡故事卡 & 完整卡頂圖 ---------- */
  .card.sc{padding:0;overflow:hidden;display:flex;align-items:flex-start;gap:0}
  .sc-media{flex:0 0 clamp(250px,24vw,340px);aspect-ratio:1;position:relative;min-height:0;overflow:hidden;background:linear-gradient(135deg,#e2e8f2,#e9e4f2)}
  .full-intro{display:grid;grid-template-columns:clamp(250px,24vw,340px) minmax(0,1fr);gap:28px;align-items:start}
  .full-summary{--full-space:18px;min-width:0;display:flex;flex-direction:column;gap:var(--full-space)}
  .full-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px}
  .full-head .badges{flex:1;min-width:0}
  .card-hero{position:relative;aspect-ratio:1;overflow:hidden;border-radius:var(--r-inner);background:linear-gradient(135deg,#e2e8f2,#e9e4f2)}
  .sc-img{width:100%;height:100%;object-fit:cover;display:block}
  .sc-fallback{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;background:linear-gradient(140deg,#dfe9f6,#e7e2f4 55%,#f3e8ec)}
  .sc-fallback .sc-fav{width:34px;height:34px;border-radius:9px;margin-bottom:12px;box-shadow:0 3px 10px -3px rgba(23,27,41,.3);background:#fff}
  .sc-fallback b{font-size:34px;font-weight:800;letter-spacing:-.02em;color:var(--navy);line-height:1.1;font-variant-numeric:tabular-nums}
  .sc-fallback span{font-size:12px;color:var(--ink2);font-weight:600;margin-top:7px;max-width:82%;line-height:1.5}
  .noimg > .sc-img{display:none}
  .noimg > .sc-fallback{display:flex}
  .sc-body{--story-space:16px;flex:1;min-width:0;padding:24px 28px;display:flex;flex-direction:column;gap:var(--story-space)}
  .sc-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
  .sc-headmain{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--story-space)}
  .sc-body h2{font-size:24px}
  .sc-blurb{font-size:15px;line-height:1.8;color:var(--ink);font-weight:600}

  .sc-summary{
    background:linear-gradient(135deg,rgba(220,239,255,.98),rgba(242,248,255,.92));
    border:1px solid rgba(73,137,205,.24);border-radius:var(--r-inner);padding:18px 20px;
  }
  .sc-summary .sec-label{color:var(--t2-fg);letter-spacing:.1em}
  .sc-summary p{font-size:14.5px;line-height:1.75;color:#2b3b52;font-weight:400}
  @media (max-width:640px){
    .card.sc{flex-direction:column}
    .sc-media{width:100%;flex-basis:auto;aspect-ratio:auto;min-height:172px}
    .sc-body{padding:18px 18px}
    .full-intro{display:block}
    .card-hero{height:172px;aspect-ratio:auto;margin:0 0 18px;border-radius:var(--r-inner)}
  }

  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
  .badge{font-size:11.5px;padding:4px 12px;border-radius:999px;font-weight:700;letter-spacing:.02em}
  .b-cat{background:rgba(255,255,255,.7);border:1px solid var(--stroke);color:var(--ink2);font-weight:600}
  .b-ind{background:rgba(255,255,255,.55);border:1px solid var(--stroke);color:var(--ink2);font-weight:600}
  .b-src{background:rgba(255,255,255,.55);border:1px solid var(--stroke);color:var(--ink3);font-weight:600}
  .badge.tag{cursor:pointer;font-family:inherit;line-height:1.75;transition:var(--ease)}
  .b-ind.tag:hover{color:var(--ink);box-shadow:var(--sh-card)}
  .b-cat.tag:hover{color:var(--ink);box-shadow:var(--sh-card)}

  .card-top{display:flex;justify-content:space-between;gap:22px;align-items:flex-start;flex-wrap:wrap}
  h2{font-size:24px;font-weight:800;letter-spacing:1px;line-height:1.4}
  h2 a{color:inherit;text-decoration:none;transition:var(--ease)}
  h2 a:hover{color:var(--t2-fg);text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:1.5px}
  .meta{font-size:12.5px;color:var(--ink3);margin-top:6px;font-weight:500}

  .score{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;border:0;background:transparent;padding:0;color:inherit;font:inherit;cursor:pointer;transition:transform var(--ease)}
  .score:hover{transform:translateY(-2px)}
  .score:focus-visible{outline:2px solid var(--ink2);outline-offset:5px;border-radius:50%}
  .ring{position:relative;width:64px;height:64px}
  .ring svg{transform:rotate(-90deg)}
  .ring .track{stroke:rgba(23,27,41,.08)}
  .ring .val{stroke:var(--navy);stroke-linecap:round}
  .ring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16.5px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .radar-modal{position:fixed;inset:0;z-index:90;display:grid;place-items:center;padding:20px;background:rgba(23,27,41,.34);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .radar-modal[hidden]{display:none}
  .radar-dialog{position:relative;width:min(460px,100%);max-height:min(720px,88vh);overflow:auto;background:#fff;border:1px solid var(--stroke);border-radius:24px;padding:24px;box-shadow:0 28px 70px -24px rgba(23,27,41,.5)}
  .radar-title{font-size:16px;font-weight:800;line-height:1.45;padding-right:42px}
  .radar-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border:1px solid var(--stroke);border-radius:50%;background:#fff;color:var(--ink2);font:inherit;font-size:22px;line-height:1;cursor:pointer}
  .radar-dialog .radar-wrap{margin-top:12px}

  .metrics{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
  .full-summary>.metrics{margin-top:0}
  .metric{
    background:rgba(255,255,255,.75);border:1px solid var(--stroke);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);
    border-radius:var(--r-inner);padding:12px 18px;
  }
  .metric b{font-size:20px;font-weight:800;display:block;line-height:1.3;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .metric span{font-size:11.5px;color:var(--ink3);font-weight:500}

  .sec{margin-top:20px}
  .sec-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
  .sec p{font-size:14.5px;color:var(--ink)}

  /* story rail：問題→思維→成果 敘事軌 */
  .story{position:relative;margin-top:28px;max-width:720px}

  {title:"Duolingo 成長模型：日活躍用戶（DAU）四年成長 4 倍的指標框架",original_title:"Meaningful metrics: How data sharpened the focus of product teams",url:"https://blog.duolingo.com/growth-model-duolingo/",source:"Duolingo Blog",tier:1,date:"2023-02-17",author:"Erin Gustafson, Ph.D.（Duolingo 數據科學團隊）",cats:["國際品牌","經典案例"],industry:"教育",
   why:"2018 年日活躍用戶（DAU）成長停滯。Duolingo 不走付費投放路線，成長必須由產品本身驅動——問題變成：該優化哪個指標，才能真正撬動 DAU？",

const tierBonus = {0:0, 1:1.0, 2:0.5, 3:0.5, 4:0};
const MAXSCORE = 11;
const bonusOf = c => (tierBonus[c.tier] != null ? tierBonus[c.tier] : 0);
const total = c => c.scores.reduce((a,b)=>a+b,0) + bonusOf(c);

function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function ringHtml(c){
  const score = total(c), R = 27, C = 2*Math.PI*R;
  const off = C * (1 - Math.min(score, MAXSCORE)/MAXSCORE);
  const key = c.url || c.title;
  return `<button type="button" class="score" data-radar-key="${esc(key)}" aria-label="查看五維品質雷達：${esc(c.title)}"><div class="ring">
    <svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
      <circle class="track" cx="32" cy="32" r="${R}" fill="none" stroke-width="5"/>
      <circle class="val" cx="32" cy="32" r="${R}" fill="none" stroke-width="5" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
    </svg><b>${score.toFixed(1)}</b></div></button>`;
}
function radarSvg(scores){
  const cx=100, cy=90, R=54, LR=R+21;
  const pt=(i,r)=>{const a=-Math.PI/2 + i*2*Math.PI/5; return [cx+r*Math.cos(a), cy+r*Math.sin(a)];};
  const poly=r=>Array.from({length:5},(_,i)=>pt(i,r).map(v=>v.toFixed(1)).join(",")).join(" ");
  const val=Array.from({length:5},(_,i)=>pt(i, Math.max(scores[i]/2,0.06)*R).map(v=>v.toFixed(1)).join(",")).join(" ");
  const axes=Array.from({length:5},(_,i)=>{const[x,y]=pt(i,R);return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" class="raxis"/>`;}).join("");
  const labels=DIMS.map((d,i)=>{const[x,y]=pt(i,LR);return `<text x="${x.toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="middle" class="rlabel">${d}</text>`;}).join("");
  return `<svg width="200" height="182" viewBox="0 0 200 182" role="img" aria-label="五維品質雷達圖">
    <polygon points="${poly(R)}" class="rgrid"/>
    <polygon points="${poly(R*0.5)}" class="rgrid"/>
    ${axes}
    <polygon points="${val}" class="rval"/>
    ${labels}
  </svg>`;
}

function dimHtml(c, notes){
  const noteList = notes ? `<div class="dim-notes">${c.scores.map((s,i)=>
    `<div class="dnote"><b>${DIMS[i]} ${s}/2</b> — ${esc(notes[i]||"")}</div>`).join("")}</div>` : "";
  return `<div class="radar-wrap">${radarSvg(c.scores)}${noteList}</div>`;
}

const LAYOUT_BRIEF_ICON = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="2.5" y="3" width="4.5" height="4.5" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M9.5 4h4M9.5 6.5h3M2.5 10.5h11M2.5 13h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const LAYOUT_FULL_ICON = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2.5 3.5h11M2.5 6.5h11M2.5 9.5h11M2.5 12.5h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

function dnum(s){ if(!s) return 0; const p=String(s).split("-"); const y=(p[0]||"0"), m=(p[1]||"0"), da=(p[2]||"0"); return parseInt(y.padStart(4,"0")+m.padStart(2,"0")+da.padStart(2,"0"),10)||0; }
function sortCmp(a,b){ return SORT==="date" ? (dnum(b.date)-dnum(a.date)) : (total(b)-total(a)); }

function industryList(){
  const present = [...new Set(CASES.map(c=>c.industry).filter(Boolean))];
  const ordered = IND_ORDER.filter(x=>present.includes(x));
  present.forEach(x=>{ if(!ordered.includes(x)) ordered.push(x); });
  return ordered;
}

function mkChip(label, on, onclick){
  const b = document.createElement("button");
  b.type = "button";
  b.className = "chip" + (on ? " on" : "");
  b.textContent = label;
  b.onclick = onclick;
  return b;
}

function buildChips(){
  const fbox = document.getElementById("filters");
  const hasAdv = advActiveCount() > 0;
  fbox.innerHTML = "";
  // 進階篩選生效時，保留既有主選單狀態但不顯示任何已選取項。
  fbox.appendChild(mkChip("全部", !hasAdv && NAV.type==="all", ()=>{ subOpen=false; setNav("all",null); }));
  const present = new Set(CASES.flatMap(c=>c.cats));
  CAT_ORDER.filter(x=>present.has(x)).forEach(cat=>{
    fbox.appendChild(mkChip(CHIP_LABELS[cat]||cat, !hasAdv && NAV.type==="cat"&&NAV.value===cat, ()=>{ subOpen=false; setNav("cat",cat); }));
  });
  const more = mkChip("更多", !hasAdv && (subOpen||NAV.type==="ind"), toggleSub);
  more.classList.add("more");
  more.setAttribute("aria-expanded", subOpen ? "true" : "false");
  more.innerHTML = '更多<span class="caret" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="m3 5.25 4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
  fbox.appendChild(more);
  const mobileFilter = document.createElement("button");
  mobileFilter.type = "button";
  mobileFilter.className = "mobile-sticky-filter" + (hasAdv ? " on" : "");
  mobileFilter.setAttribute("aria-label", hasAdv ? `進階篩選（已套用 ${advActiveCount()} 項）` : "進階篩選");
  mobileFilter.title = "進階篩選";
  mobileFilter.innerHTML = FILTER_ICON + (hasAdv ? `<span class="mobile-advbadge">${advActiveCount()}</span>` : "");
  mobileFilter.onclick = ()=>{ advOpen ? cancelAdv() : openAdv(); };
  fbox.appendChild(mobileFilter);
  buildSubmenu();
}

// 進階篩選按鈕（獨立於主選單、位於最右側）
function renderAdvToggle(){
  const btn = document.getElementById("adv-toggle");
  if(!btn) return;
  const n = advActiveCount();
  btn.className = "adv-toggle" + (advOpen||n ? " on" : "");
  btn.setAttribute("aria-expanded", advOpen ? "true" : "false");
  btn.innerHTML = FILTER_ICON + '<span class="adv-btn-t">進階篩選</span>' + (n ? `<span class="advbadge">${n}</span>` : "");
  btn.onclick = ()=>{ advOpen ? cancelAdv() : openAdv(); };
}

function buildSubmenu(){
  const wrap = document.getElementById("submenu-wrap");
  const box = document.getElementById("submenu");
  box.innerHTML = "";
  industryList().forEach(ind=>{
    const b = document.createElement("button");
    b.type = "button";
    b.className = "subchip" + (advActiveCount()===0 && NAV.type==="ind"&&NAV.value===ind ? " on" : "");
    b.textContent = "#" + ind;
    b.onclick = ()=>{ subOpen=true; setNav("ind",ind); };
    box.appendChild(b);
  });
  wrap.hidden = !subOpen;
}

function toggleSub(){
  if(subOpen && NAV.type==="ind"){ subOpen=false; setNav("all",null); return; }
  subOpen = !subOpen;
  syncUI();
}

// 依一組 facet 選擇計算符合筆數（獨立於主選單 tab）
function countWith(sel){
  return CASES.filter(c=>{
    if(sel.goal && !(c.f_goal||[]).includes(sel.goal)) return false;
    if(sel.product && !(c.f_product||[]).includes(sel.product)) return false;
    if(sel.industry && !(c.f_industry||[]).includes(sel.industry)) return false;
    return true;
  }).length;
}

function openAdv(){ PENDING = {...ADV}; advOpen = true; sortOpen = false; syncUI(); }   // 開啟：載入已套用值為草稿

function renderTools(){
  const sb = document.getElementById("sort-btn");
  if(sb){
    sb.className = "icon-btn" + ((sortOpen || SORT!=="score") ? " on" : "");
    sb.innerHTML = SORT_ICON;
    sb.setAttribute("aria-expanded", String(sortOpen));
    const pop = document.getElementById("sort-pop");
    if(pop){
      pop.innerHTML = [["date","最新","依原文發布時間"],["score","評分","依五維總分"]]
        .map(([k,l,s])=>`<button type="button" class="pop-item${SORT===k?' on':''}" data-sort="${k}">${l}<span class="pi-sub">${s}</span></button>`).join("");
      pop.hidden = !sortOpen;
    }
  }
  const lb = document.getElementById("layout-btn");
  if(lb){
    lb.className = "icon-btn" + (VIEW==="full" ? " on" : "");
    lb.innerHTML = VIEW==="brief" ? LAYOUT_BRIEF_ICON : LAYOUT_FULL_ICON;
    lb.title = VIEW==="brief" ? "切換為完整排版" : "切換為精簡排版";
  }
}

function storyHtml(c, animate){
  const prov = [c.source, c.date].filter(Boolean).map(esc).join("・");
  return `
    <article class="card sc${animate ? " enter" : ""}">
      <div class="sc-media">${mediaInner(c)}</div>
      <div class="sc-body">
        <div class="sc-head">
          <div class="sc-headmain">
            <div class="badges">
              ${c.industry?`<button type="button" class="badge b-ind tag" data-ind="${esc(c.industry)}">#${esc(c.industry)}</button>`:""}
              ${c.cats.filter(x=>x!=="更多案例").map(x=>`<button type="button" class="badge b-cat tag" data-cat="${esc(x)}">${esc(x)}</button>`).join("")}
              <span class="badge b-src">${esc(c.source)}</span>
            </div>
            <h2><a href="${esc(c.url)}" target="_blank" rel="noopener" title="閱讀原文">${esc(c.title)}</a></h2>
          </div>
          ${ringHtml(c)}
        </div>
        <div class="sc-summary"><div class="sec-label">重點摘要</div><p>${esc(c.blurb || c.takeaway)}</p></div>
        <div class="sc-actions"><a class="read-btn" href="${esc(c.url)}" target="_blank" rel="noopener">閱讀原文${extIcon}</a>${prov?`<div class="prov">${prov}</div>`:""}</div>
      </div>
    </article>`;
}
function cancelAdv(){ advOpen = false; syncUI(); }                    // 取消：丟棄草稿
function applyAdv(){
  if(countWith(PENDING) === 0) return;                               // 0 筆不可套用
  ADV = {...PENDING};
  // 保留原主選單狀態；篩選清除後可無縫回復該選取項。
  advOpen = false;
  visibleCount = RUN.batchSize;
  syncUI();
}

function renderAdvanced(){
  const box = document.getElementById("adv");
  const wrap = document.getElementById("adv-wrap");
  document.getElementById("sticky-head").classList.toggle("adv-open", advOpen);
  box.innerHTML = "";
  FACETS.forEach(facet=>{
    const cur = PENDING[facet.key];
    const chip = (item)=>{
      const n = countWith({...PENDING, [facet.key]: item});   // 情境數量：加選這項會有幾筆
      const on = cur===item;
      return `<button type="button" class="adv-chip${on?" on":""}${n===0?" zero":""}" data-facet="${esc(facet.key)}" data-item="${esc(item)}">${esc(item)}<span class="cnt">${n}</span></button>`;
    };
    let body;
    if(facet.groups){
      body = facet.groups.map(g=>`<div class="adv-sub"><span class="adv-sub-h">${esc(g.label)}</span><div class="adv-chips">${g.items.map(chip).join("")}</div></div>`).join("");
    } else {
      body = `<div class="adv-chips">${(facet.items||[]).map(chip).join("")}</div>`;
    }
    const sec = document.createElement("div");
    sec.className = "adv-group";
    sec.innerHTML = `<div class="adv-h">${esc(facet.label)}</div>${body}`;
    box.appendChild(sec);
  });
  const hasPending = ADV_KEYS.some(k=>PENDING[k]);
  const nRes = countWith(PENDING);
  const CLR_ICON = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13 3.5A6 6 0 1 0 14 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M13.5 1.5v3h-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const hasApplied = advActiveCount() > 0;
  const applyLabel = !hasPending ? (hasApplied ? "清除篩選" : "尚未篩選") : ("篩選出 " + nRes + " 筆");
  const applyDisabled = ((!hasPending && !hasApplied) || nRes===0);
  const foot = document.createElement("div");
  foot.className = "adv-foot";
  foot.innerHTML = (hasPending ? `<button type="button" class="adv-clear-mini" id="adv-clear">${CLR_ICON}清除篩選</button>` : `<span></span>`)
    + `<div class="adv-foot-r">`
    + `<button type="button" class="adv-cancel" id="adv-cancel">取消</button>`
    + `<button type="button" class="adv-apply" id="adv-apply"${applyDisabled?" disabled":""}>${applyLabel}</button>`
    + `</div>`;
  box.appendChild(foot);
  box.querySelectorAll(".adv-chip").forEach(b=>{
    b.onclick = ()=>{ const f=b.dataset.facet, it=b.dataset.item; PENDING[f] = PENDING[f]===it ? null : it; renderAdvanced(); };  // 只更新草稿，不動文章
  });
  document.getElementById("adv-cancel").onclick = cancelAdv;
  const clr = document.getElementById("adv-clear");
  if(clr) clr.onclick = ()=>{ PENDING = {goal:null, product:null, industry:null}; renderAdvanced(); };
  const ap = document.getElementById("adv-apply");
  if(ap && !applyDisabled) ap.onclick = applyAdv;
  wrap.hidden = !advOpen;
  const bd = document.getElementById("adv-backdrop");
  if(bd) bd.hidden = !advOpen;
}

function setNav(type, value){
  NAV = {type, value};
  ADV = {goal:null, product:null, industry:null};   // 主選單與進階篩選互斥、獨立
  advOpen = false;
  visibleCount = RUN.batchSize;
  syncUI();
}

function syncUI(){
  buildChips();
  renderAdvToggle();
  renderTools();
  renderAdvanced();
  render();
}

function filteredList(){
  const useAdv = advActiveCount() > 0;   // 進階篩選一旦套用，就獨立於主選單 tab
  const list = CASES.filter(c=>{
    if(useAdv){
      if(ADV.goal && !(c.f_goal||[]).includes(ADV.goal)) return false;
      if(ADV.product && !(c.f_product||[]).includes(ADV.product)) return false;
      if(ADV.industry && !(c.f_industry||[]).includes(ADV.industry)) return false;
    } else {
      if(NAV.type==="cat" && navCategoryOf(c)!==NAV.value) return false;
      if(NAV.type==="ind" && c.industry!==NAV.value) return false;
    }
    return true;
  });
  return list.sort(sortCmp);
}

function render(newFrom = -1){
  const feed = document.getElementById("feed");
  const list = filteredList();
  const shown = list.slice(0, visibleCount);
  document.getElementById("empty").style.display = shown.length ? "none":"block";
  feed.innerHTML = shown.map((c,i)=> VIEW==="brief"
    ? storyHtml(c, newFrom >= 0 && i >= newFrom)
    : cardHtml(c, newFrom >= 0 && i >= newFrom)).join("");
  renderLoadZone(list.length);
}

function renderLoadZone(totalLen){
  const zone = document.getElementById("load-zone");
  const remaining = totalLen - visibleCount;
  if(totalLen === 0){ zone.innerHTML = ""; return; }
  if(remaining > 0){
    zone.innerHTML = `
      <button class="load-btn" id="load-more">
        展開更多案例 <span class="count">${Math.min(RUN.batchSize, remaining)}</span>
      </button>`;
    document.getElementById("load-more").onclick = ()=>{
      const from = visibleCount;
      visibleCount += RUN.batchSize;
      render(from);
      const cards = document.querySelectorAll("#feed .card");
      if(cards[from]) cards[from].scrollIntoView({behavior:"smooth", block:"start"});
    };
  } else {
    zone.innerHTML = `
      <div class="load-done"><i></i>已瀏覽本輪全部 ${totalLen} 則・明日自動收集新一批</div>`;
  }
}

function wireBadgeFilter(){
  document.getElementById("feed").addEventListener("click", e=>{
    const t = e.target.closest("[data-ind],[data-cat]");
    if(!t) return;
    if(t.dataset.ind != null){ subOpen=true; setNav("ind", t.dataset.ind); }
    else if(t.dataset.cat != null){ subOpen=false; setNav("cat", t.dataset.cat); }
    const s = document.getElementById("toolbar-sentinel");
    if(s && s.scrollIntoView) s.scrollIntoView({behavior:"smooth", block:"start"});
  });
}

// 工具列採事件委派：render/syncUI 會重繪按鈕內容，若將 click handler
// 綁在每一次重繪的節點上，快速點擊或版面切換時可能遺失事件。
function wireToolbarInteractions(){
  const row = document.getElementById("toolbar-row");
  row.addEventListener("click", e=>{
    const sortBtn = e.target.closest("#sort-btn");
    if(sortBtn){
      e.preventDefault();
      e.stopPropagation();
      sortOpen = !sortOpen;
      advOpen = false;
      syncUI();
      return;
    }
    const sortItem = e.target.closest("#sort-pop .pop-item");
    if(sortItem){
      e.preventDefault();
      e.stopPropagation();
      SORT = sortItem.dataset.sort;
      sortOpen = false;
      visibleCount = RUN.batchSize;
      syncUI();
      return;
    }
    const layoutBtn = e.target.closest("#layout-btn");
    if(layoutBtn){
      e.preventDefault();
      VIEW = VIEW==="brief" ? "full" : "brief";
      syncUI();
    }
  });
}

function renderRejected(){
  const rc = document.getElementById("rej-count");
  if(rc) rc.textContent = REJECTED.length;
  document.getElementById("rejected").innerHTML = REJECTED.map(c=>`
  <article class="card rejected">
    <div class="card-top">
      <div style="flex:1;min-width:250px">
        <h2 style="font-size:18.5px"><a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a></h2>
        <div class="meta">${esc(c.source)}</div>
        <div class="reject-reason">${esc(c.reason)}</div>
      </div>
      ${ringHtml(c)}
    </div>
    <div class="actions">
      <a class="read-btn ghost" href="${esc(c.url)}" target="_blank" rel="noopener">閱讀原文${extIcon}</a>
    </div>
  </article>`).join("");
}

function init(){
  visibleCount = RUN.batchSize || 15;
  buildChips();
  renderAdvToggle();
  renderTools();
  renderAdvanced();
  renderRejected();
  render();
  wireBadgeFilter();
  wireToolbarInteractions();
  const bd = document.getElementById("adv-backdrop");
  if(bd) bd.onclick = cancelAdv;
  document.addEventListener("pointerdown", e=>{
    const target = e.target;
    if(sortOpen && !target.closest(".sort-anchor")){ sortOpen = false; syncUI(); }
    const score = target.closest(".score[data-radar-key]");
    if(score){ openRadar(score.dataset.radarKey); return; }
    if(target === document.getElementById("radar-modal")) closeRadar();
  });
  document.getElementById("radar-close").onclick = closeRadar;
  document.addEventListener("keydown", e=>{ if(e.key === "Escape"){ if(!document.getElementById("radar-modal").hidden) closeRadar(); else if(sortOpen){ sortOpen=false; syncUI(); } } });
}

async function boot(){
  try{
    const r = await fetch("cases.json", {cache:"no-store"});
    if(r.ok){
      const j = await r.json();
      if(j && Array.isArray(j.cases)){
        CASES = j.cases;
        REJECTED = Array.isArray(j.rejected) ? j.rejected : [];
        if(j.updated) RUN.date = j.updated;
        if(j.run){ if(j.run.scanned!=null) RUN.scanned=j.run.scanned; if(j.run.candidates!=null) RUN.candidates=j.run.candidates; }
        FACETS = Array.isArray(j.facets) ? j.facets : [];
      }
    }
  }catch(e){ /* 本機 file:// 或離線：改用內建 fallback 資料 */ }
  document.getElementById("st-scanned").textContent = RUN.scanned;
  document.getElementById("st-candidates").textContent = RUN.candidates;
  document.getElementById("st-published").textContent = CASES.length;
  init();
  const sentinel = document.getElementById("toolbar-sentinel");
  if(window.IntersectionObserver && sentinel){
    new IntersectionObserver(([e])=>{
      document.getElementById("sticky-head").classList.toggle("stuck", !e.isIntersecting);
    }, {threshold:0}).observe(sentinel);
  }
}
boot();
</script>
</body>
