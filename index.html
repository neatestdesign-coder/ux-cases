<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX 商業案例分享</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light;
    --bg:#EEF1F5;
    --glass:rgba(255,255,255,.62);
    --glass-strong:rgba(255,255,255,.8);
    --ink:#1A1E2B; --ink2:#646B7A; --ink3:#9AA1B0;
    --navy:#171B29;
    --lime:#D7F16B; --lime-soft:rgba(215,241,107,.32); --lime-ink:#4A5417;
    --stroke:rgba(23,27,41,.06);
    --t1-bg:#DCF1E8; --t1-fg:#1E6B54;
    --t2-bg:#DFE9F6; --t2-fg:#2F5787;
    --t3-bg:#E9E2F6; --t3-fg:#5D468F;
    --t4-bg:#F6E9DC; --t4-fg:#8A5A2A;
    --reject:#A05543;
    --r-card:28px; --r-inner:16px;
    --sh-card:0 1px 2px rgba(23,27,41,.04), 0 12px 32px -8px rgba(23,27,41,.10);
    --sh-hover:0 2px 4px rgba(23,27,41,.05), 0 20px 44px -8px rgba(23,27,41,.14);
    --ease:180ms cubic-bezier(.2,.7,.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    color:var(--ink);
    font-family:"Inter","Noto Sans TC","PingFang TC",-apple-system,sans-serif;
    line-height:1.75;-webkit-font-smoothing:antialiased;
    background:var(--bg);min-height:100vh;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(900px 600px at 12% -5%, #DCE6EE 0%, transparent 60%),
      radial-gradient(800px 640px at 95% 12%, #E7E2F4 0%, transparent 62%),
      radial-gradient(900px 700px at 55% 108%, #F3E8EC 0%, transparent 60%),
      var(--bg);
  }
  .wrap{width:80%;max-width:1500px;margin:0 auto;padding:56px 0 96px}

  .header-grid{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;flex-wrap:wrap}
  .header-left{flex:1 1 480px;min-width:280px}
  h1{font-size:48px;font-weight:900;letter-spacing:-.03em;line-height:1.18}
  .sub{color:var(--ink2);font-size:15px;margin-top:14px;max-width:560px}

  .stats{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;margin-top:8px}
  .stat{
    background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.65);
    border-radius:20px;padding:16px 24px;min-width:132px;
  }
  .stat b{display:block;font-size:28px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.2}
  .stat span{font-size:12px;color:var(--ink3);font-weight:500}
  .stat.hero{position:relative;overflow:hidden}
  .stat.hero::after{content:"";position:absolute;right:-18px;top:-18px;width:64px;height:64px;border-radius:50%;background:var(--lime-soft)}

  .toolbar{
    position:sticky;top:16px;z-index:10;
    display:flex;gap:6px;flex-wrap:wrap;align-items:center;
    background:var(--glass-strong);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.7);
    border-radius:999px;padding:8px;margin:40px 0 36px;width:fit-content;
    transition:margin .2s ease, border-radius .2s ease;
  }
  .chip{
    border:none;background:transparent;border-radius:999px;
    padding:8px 18px;font-size:13.5px;font-weight:600;color:var(--ink2);
    cursor:pointer;transition:var(--ease);font-family:inherit;
  }
  .chip:hover{color:var(--ink);background:rgba(23,27,41,.05)}
  .chip.on{background:var(--navy);color:#fff;box-shadow:0 6px 16px -4px rgba(23,27,41,.4)}

  .card{
    background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--stroke);
    box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.65);
    border-radius:var(--r-card);padding:30px 34px;margin-bottom:26px;
    transition:var(--ease);
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--sh-hover), inset 0 0 0 1px rgba(255,255,255,.75)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card.enter{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}

  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .badge{font-size:11.5px;padding:4px 12px;border-radius:999px;font-weight:700;letter-spacing:.02em}
  .b-cat{background:rgba(255,255,255,.7);border:1px solid var(--stroke);color:var(--ink2);font-weight:600}
  .b-ind{background:var(--t2-bg);color:var(--t2-fg)}

  .card-top{display:flex;justify-content:space-between;gap:22px;align-items:flex-start;flex-wrap:wrap}
  h2{font-size:21.5px;font-weight:800;letter-spacing:-.015em;line-height:1.45}
  h2 a{color:inherit;text-decoration:none;transition:var(--ease)}
  h2 a:hover{color:var(--t2-fg);text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:1.5px}
  .meta{font-size:12.5px;color:var(--ink3);margin-top:6px;font-weight:500}

  .score{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
  .ring{position:relative;width:64px;height:64px}
  .ring svg{transform:rotate(-90deg)}
  .ring .track{stroke:rgba(23,27,41,.08)}
  .ring .val{stroke:var(--navy);stroke-linecap:round}
  .ring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16.5px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .score small{font-size:10.5px;color:var(--ink3);font-weight:600;letter-spacing:.08em}

  .metrics{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
  .metric{
    background:rgba(255,255,255,.75);border:1px solid var(--stroke);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);
    border-radius:var(--r-inner);padding:12px 18px;
  }
  .metric b{font-size:20px;font-weight:800;display:block;line-height:1.3;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .metric span{font-size:11.5px;color:var(--ink3);font-weight:500}

  .sec{margin-top:20px}
  .sec-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
  .sec p{font-size:14.5px;color:var(--ink)}

  /* story rail：問題→思維→成果 敘事軌 */
  .story{position:relative;margin-top:28px;max-width:720px}
  .story::before{content:"";position:absolute;left:5px;top:12px;bottom:12px;width:2px;border-radius:1px;background:linear-gradient(rgba(23,27,41,.16),rgba(23,27,41,.03))}
  .step{position:relative;padding-left:32px}
  .step + .step{margin-top:24px}
  .step::before{content:"";position:absolute;left:0;top:4px;width:12px;height:12px;border-radius:50%;background:#fff;border:2.5px solid var(--navy);box-shadow:0 0 0 3px rgba(255,255,255,.7)}
  .step.result::before{background:var(--lime);border-color:var(--lime-ink)}
  .step-label{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px}
  .step p{font-size:15px;line-height:1.9;color:var(--ink)}
  .caveat{
    font-size:12.5px;color:var(--ink3);margin-top:10px;
    background:rgba(23,27,41,.045);border-radius:10px;padding:10px 14px;line-height:1.65;
  }
  .caveat b{color:var(--ink2);font-weight:700}
  .takeaway{
    background:linear-gradient(135deg, var(--lime-soft), rgba(215,241,107,.14));
    border:1px solid rgba(160,180,60,.22);
    border-radius:var(--r-inner);padding:18px 20px;margin-top:20px;
  }
  .takeaway .sec-label{color:var(--lime-ink)}
  .takeaway p{font-size:14.5px;color:#333a17}

  .prov{font-size:12px;color:var(--ink3);margin-top:20px;font-weight:500;line-height:1.6;padding:16px 0}

  .actions{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;margin-top:12px}
  .read-btn{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--navy);color:#fff;text-decoration:none;
    border-radius:999px;padding:9px 20px;font-size:13px;font-weight:700;
    box-shadow:0 8px 20px -6px rgba(23,27,41,.45);
    transition:var(--ease);white-space:nowrap;
  }
  .read-btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px -6px rgba(23,27,41,.5)}
  .read-btn .src{opacity:.55;font-weight:500}
  .read-btn.ghost{background:rgba(255,255,255,.7);color:var(--ink2);border:1px solid var(--stroke);box-shadow:none;font-weight:600}
  .read-btn.ghost:hover{color:var(--ink);box-shadow:var(--sh-card)}
  details{flex:1;min-width:200px;display:flex;flex-direction:column;align-items:flex-end}
  summary{
    list-style:none;cursor:pointer;user-select:none;width:fit-content;
    font-size:12.5px;font-weight:600;color:var(--ink2);
    background:rgba(255,255,255,.7);border:1px solid var(--stroke);border-radius:999px;
    padding:8px 18px;transition:var(--ease);
  }
  summary:hover{color:var(--ink);box-shadow:var(--sh-card)}
  summary::-webkit-details-marker{display:none}
  summary::after{content:" ↓";font-size:11px;color:var(--ink3)}
  details[open] summary::after{content:" ↑"}

  .radar-wrap{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-top:14px;width:100%}
  .radar-wrap svg{flex-shrink:0}
  .rgrid{fill:none;stroke:rgba(23,27,41,.10);stroke-width:1}
  .raxis{stroke:rgba(23,27,41,.07);stroke-width:1}
  .rval{fill:rgba(23,27,41,.14);stroke:var(--navy);stroke-width:1.8;stroke-linejoin:round}
  .rlabel{font-size:10px;font-weight:700;fill:var(--ink2)}
  .dim-notes{flex:1;min-width:230px;display:flex;flex-direction:column;gap:7px}
  .dnote{font-size:12px;color:var(--ink3);line-height:1.6;background:rgba(255,255,255,.7);border:1px solid var(--stroke);border-radius:12px;padding:8px 12px}
  .dnote b{color:var(--ink2);font-weight:700}

  .load-zone{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 0 6px}
  .load-btn{
    display:inline-flex;align-items:center;gap:9px;
    background:var(--glass-strong);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--stroke);box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.7);
    border-radius:999px;padding:13px 30px;
    font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;
    transition:var(--ease);font-family:inherit;
  }
  .load-btn:hover{transform:translateY(-2px);box-shadow:var(--sh-hover), inset 0 0 0 1px rgba(255,255,255,.8)}
  .load-btn .count{background:var(--navy);color:#fff;border-radius:999px;font-size:11.5px;font-weight:700;padding:2px 10px;font-variant-numeric:tabular-nums}
  .load-done{
    font-size:13px;color:var(--ink3);font-weight:500;text-align:center;
    display:inline-flex;align-items:center;gap:8px;
    background:var(--glass);border:1px solid var(--stroke);border-radius:999px;padding:10px 24px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.65);
  }
  .load-done i{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px var(--lime-soft);flex-shrink:0}

  .rejected-zone{margin-top:64px}
  .rejected-zone>h3{font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px;color:var(--reject)}
  .rejected-zone>p{font-size:13.5px;color:var(--ink2);margin-bottom:20px;max-width:560px}
  .card.rejected{background:rgba(255,255,255,.4);opacity:.92}
  .card.rejected:hover{transform:none;box-shadow:var(--sh-card), inset 0 0 0 1px rgba(255,255,255,.65)}
  .card.rejected .ring .val{stroke:var(--reject)}
  .card.rejected .rval{stroke:var(--reject);fill:rgba(160,85,67,.12)}
  .reject-reason{font-size:13px;color:var(--reject);margin-top:12px;font-weight:600;line-height:1.6}

  footer{
    margin-top:72px;font-size:12.5px;color:var(--ink3);line-height:2;
    background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--stroke);box-shadow:inset 0 0 0 1px rgba(255,255,255,.65);
    border-radius:20px;padding:20px 26px;
  }
  footer a{color:var(--ink2);font-weight:700;text-decoration:none;border-bottom:1px solid var(--stroke)}
  footer a:hover{color:var(--ink)}
  .powerby{margin-top:2px}
  .empty{text-align:center;color:var(--ink3);padding:72px 0;font-size:14px;display:none;font-weight:500}

  /* ---------- responsive：平板 ---------- */
  @media (max-width:1080px){
    .wrap{width:auto;padding:40px 22px 80px}
    .stats{width:100%;margin-top:4px}
  }
  /* ---------- responsive：手機（Mobile First 指標排列規則）---------- */
  @media (max-width:640px){
    .wrap{width:auto;padding:28px 16px 64px}
    h1{font-size:30px}
    .sub{font-size:13.5px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
    .stat{min-width:0;padding:12px 12px;border-radius:16px}
    .stat b{font-size:19px}
    .stat span{font-size:10px;line-height:1.4;display:block}
    .card{padding:22px 18px;border-radius:22px}
    .card-top{gap:14px}
    h2{font-size:17.5px}
    /* 指標區塊：3 項→3 欄一列、2 項→2 欄一列、4 項→2x2、1 項→滿版 */
    .metrics{display:grid;gap:8px}
    .metrics.m-1{grid-template-columns:max-content}
    .metrics.m-2{grid-template-columns:repeat(2,1fr)}
    .metrics.m-3{grid-template-columns:repeat(3,1fr)}
    .metrics.m-4{grid-template-columns:repeat(2,1fr)}
    .metric{padding:18px 20px;border-radius:12px}
    .metric b{font-size:15.5px}
    .metric span{font-size:10px;line-height:1.4;display:block}
    /* 行動列：雷達左、閱讀原文右、等寬並排；展開雷達時佔滿整列 */
    .actions{flex-direction:row;align-items:stretch;gap:10px}
    .actions .read-btn{order:2;flex:1 1 0;justify-content:center}
    .actions details{order:1;flex:1 1 0;min-width:0;align-items:stretch}
    .actions details[open]{flex-basis:100%}
    .actions summary{width:100%;text-align:center;padding:9px 0}
    .story{max-width:none}
    .step{padding-left:26px}
    .step p{font-size:14.5px;line-height:1.85}
    h2{font-size:19.5px}
    /* 吸頂時白底滿版延展，內間距不變 */
    .toolbar{top:0;border-radius:24px}
    .toolbar.stuck{margin-left:-16px;margin-right:-16px;width:auto;border-radius:0;padding:8px 16px;box-shadow:0 10px 24px -14px rgba(23,27,41,.25), inset 0 0 0 1px rgba(255,255,255,.7)}
  }
</style>
</head>
<body>
<div class="wrap">

<header class="header-grid">
  <div class="header-left">
    <h1>UX 商業案例分享</h1>
    <p class="sub">每天自動收集全球「看得到商業脈絡、決策過程與量化成果」的真實案例。</p>
  </div>
  <div class="stats">
    <div class="stat"><b id="st-scanned">—</b><span>掃描文章</span></div>
    <div class="stat"><b id="st-candidates">—</b><span>進入評分</span></div>
    <div class="stat hero"><b id="st-published">—</b><span>評分通過發佈</span></div>
  </div>
</header>

<div id="toolbar-sentinel"></div>
<nav class="toolbar" id="filters" aria-label="分類篩選"></nav>

<main id="feed"></main>
<div class="empty" id="empty">此分類今日沒有達標案例——寧缺勿濫。</div>
<div class="load-zone" id="load-zone"></div>

<section class="rejected-zone">
  <h3>未達門檻（今日淘汰）</h3>
  <p>公開淘汰紀錄是品管的一部分：讓你隨時檢驗評分規則的鬆緊，而不是黑箱。</p>
  <div id="rejected"></div>
</section>

<footer>
  <div>評分規則：五維各 0–2 分（商業脈絡・決策過程・量化成果・第一手性・可遷移性）＋ 來源層級加成，總分 ≥ 7.0 發佈。</div>
  <div class="powerby">Powered by <a href="https://www.threads.com/@meme.design.ai" target="_blank" rel="noopener">@meme.design.ai</a></div>
</footer>
</div>

<script>
const RUN = {
  date: "2026-07-11",
  scanned: 28,
  candidates: 9,
  batchSize: 4,
  tierNames: {1:"第一手",2:"深度拆解",3:"商業視角",4:"華文來源"},
  tierStyle: {
    1:"background:var(--t1-bg);color:var(--t1-fg)",
    2:"background:var(--t2-bg);color:var(--t2-fg)",
    3:"background:var(--t3-bg);color:var(--t3-fg)",
    4:"background:var(--t4-bg);color:var(--t4-fg)"
  }
};

const DIMS = ["商業脈絡","決策過程","量化成果","第一手性","可遷移性"];

let CASES = [
  {title:"Duolingo 成長模型：DAU 四年成長 4 倍的指標框架",original_title:"Meaningful metrics: How data sharpened the focus of product teams",url:"https://blog.duolingo.com/growth-model-duolingo/",source:"Duolingo Blog",tier:1,date:"2023-02-17",author:"Erin Gustafson, Ph.D.（Duolingo 數據科學團隊）",cats:["國際品牌","經典案例"],industry:"教育學習",
   why:"2018 年 DAU 成長停滯。Duolingo 不走付費投放路線，成長必須由產品本身驅動——問題變成：該優化哪個指標，才能真正撬動 DAU？",
   how:"團隊沒有直接對 DAU 下手，而是把用戶拆成七種狀態（新用戶、現有用戶、回流、流失風險⋯），建立 Markov 狀態轉移模型，量化每個狀態轉換對 DAU 的槓桿。分析結果推翻直覺：最大槓桿不是拉新，而是 CURR（現有用戶留存率）。全公司產品團隊據此對焦。",
   result:"DAU 自 2019 年起成長 4 倍，幾乎全靠自然成長；全公司把目標從「衝 DAU」改押在 CURR 一個指標上，事後驗證這個賭注正確。",
   caveat:"模型無法解釋所有 DAU 波動，作者坦承分群方式仍在迭代中。",
   takeaway:"不要直接優化北極星指標，要找到「可操作的中介指標」。用戶狀態轉移模型可直接套用到任何訂閱／內容產品。",
   metrics:[["4×","DAU 成長（2019–2023）"],["CURR","找出的最高槓桿指標"]],scores:[2,2,2,2,2],
   score_notes:["成長停滯＋不投廣告的商業約束交代完整","含被推翻的直覺與模型極限的自我批判","4× 有時間區間與歸因","當事數據科學團隊親撰","狀態轉移模型可直接複用"]},
  {title:"LinkedIn 通知授權率提升 500%：行為觸發器的重新框架",original_title:"How LinkedIn Increased Notification Opt-in Rates by 500%",url:"https://growth.design/case-studies/linkedin-retention-triggers",source:"growth.design",tier:2,date:"2022",author:"growth.design（引用 LinkedIn 公開分享）",cats:["國際品牌"],industry:"職場社群",
   why:"通知權限一旦被拒，產品就失去最重要的再互動管道，直接影響留存與 LTV。多數產品在錯誤的時機、用產品本位的語言要權限。",
   how:"LinkedIn 把提示從「產品要什麼」翻轉成「用戶得到什麼」：(1) 在具體互動發生的當下才提示（情境化時機）、(2) 綁定單一真實互動而非泛用通知、(3) 講用戶利益而非功能、(4) 把回應簡化為 yes/no。",

/* ---- logic ---- */
const tierBonus = {1:1.0, 2:0.5, 3:0.5, 4:0};
const MAXSCORE = 11;
const total = c => c.scores.reduce((a,b)=>a+b,0) + tierBonus[c.tier];

function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function ringHtml(score, published){
  const R = 27, C = 2*Math.PI*R;
  const off = C * (1 - Math.min(score, MAXSCORE)/MAXSCORE);
  return `<div class="score"><div class="ring">
    <svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
      <circle class="track" cx="32" cy="32" r="${R}" fill="none" stroke-width="5"/>
      <circle class="val" cx="32" cy="32" r="${R}" fill="none" stroke-width="5" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
    </svg><b>${score.toFixed(1)}</b></div>
    <small>${published ? "已發佈" : "未發佈"}</small></div>`;
}

function radarSvg(scores){
  const cx=100, cy=90, R=54, LR=R+21;
  const pt=(i,r)=>{const a=-Math.PI/2 + i*2*Math.PI/5; return [cx+r*Math.cos(a), cy+r*Math.sin(a)];};
  const poly=r=>Array.from({length:5},(_,i)=>pt(i,r).map(v=>v.toFixed(1)).join(",")).join(" ");
  const val=Array.from({length:5},(_,i)=>pt(i, Math.max(scores[i]/2,0.06)*R).map(v=>v.toFixed(1)).join(",")).join(" ");
  const axes=Array.from({length:5},(_,i)=>{const[x,y]=pt(i,R);return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" class="raxis"/>`;}).join("");
  const labels=DIMS.map((d,i)=>{const[x,y]=pt(i,LR);return `<text x="${x.toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="middle" class="rlabel">${d}</text>`;}).join("");
  return `<svg width="200" height="182" viewBox="0 0 200 182" role="img" aria-label="五維品質雷達圖">
    <polygon points="${poly(R)}" class="rgrid"/>
    <polygon points="${poly(R*0.5)}" class="rgrid"/>
    ${axes}
    <polygon points="${val}" class="rval"/>
    ${labels}
  </svg>`;
}

function dimHtml(c, notes){
  const noteList = notes ? `<div class="dim-notes">${c.scores.map((s,i)=>
    `<div class="dnote"><b>${DIMS[i]} ${s}/2</b> — ${esc(notes[i]||"")}</div>`).join("")}</div>` : "";
  return `<div class="radar-wrap">${radarSvg(c.scores)}${noteList}</div>`;
}

const extIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3.5 1.5h7v7M10.5 1.5 1.5 10.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function cardHtml(c, animate){
  const prov = [c.source, c.date].filter(Boolean).map(esc).join("・");
  return `
    <article class="card${animate ? " enter" : ""}">
      <div class="badges">
        ${c.industry?`<span class="badge b-ind">${esc(c.industry)}</span>`:""}
        ${c.cats.filter(x=>x!=="更多案例").map(x=>`<span class="badge b-cat">${esc(x)}</span>`).join("")}
        <span class="badge b-cat">${esc(c.source)}</span>
      </div>
      <div class="card-top">
        <div style="flex:1;min-width:250px">
          <h2><a href="${esc(c.url)}" target="_blank" rel="noopener" title="閱讀原文">${esc(c.title)}</a></h2>
        </div>
        ${ringHtml(total(c), true)}
      </div>
      <div class="metrics m-${Math.min(c.metrics.length,4)}">${c.metrics.map(m=>`<div class="metric"><b>${esc(m[0])}</b><span>${esc(m[1])}</span></div>`).join("")}</div>
      <div class="takeaway"><div class="sec-label">核心觀點</div><p>${esc(c.takeaway)}</p></div>
      <div class="story">
        <div class="step"><div class="step-label">問題／目標</div><p>${esc(c.why)}</p></div>
        <div class="step"><div class="step-label">思維與作法</div><p>${esc(c.how)}</p></div>
        <div class="step result"><div class="step-label">成果</div><p>${esc(c.result)}</p>
          ${c.caveat?`<div class="caveat"><b>保留意見</b>　${esc(c.caveat)}</div>`:""}</div>
      </div>
      ${prov?`<div class="prov">原文出處：${prov}</div>`:""}
      <div class="actions">
        <a class="read-btn" href="${esc(c.url)}" target="_blank" rel="noopener">閱讀原文${extIcon}</a>
        <details><summary>五維品質雷達</summary>${dimHtml(c, c.score_notes)}</details>
      </div>
    </article>`;
}

let active = "全部";
let visibleCount = 4;
const CHIP_LABELS = {"顧問／商業視角":"顧問／商業", "更多案例":"更多"};

function buildChips(){
  const fbox = document.getElementById("filters");
  fbox.innerHTML = "";
  const allCats = ["全部", ...new Set(CASES.flatMap(c=>c.cats))];
  allCats.forEach(cat=>{
  const b = document.createElement("button");
  b.className = "chip" + (cat===active?" on":"");
  b.textContent = CHIP_LABELS[cat] || cat;
  b.onclick = ()=>{
    active = cat;
    visibleCount = RUN.batchSize;
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    render();
  };
  fbox.appendChild(b);
  });
}

function filteredList(){
  return CASES.filter(c => active==="全部" || c.cats.includes(active))
              .sort((a,b)=>total(b)-total(a));
}

function render(newFrom = -1){
  const feed = document.getElementById("feed");
  const list = filteredList();
  const shown = list.slice(0, visibleCount);
  document.getElementById("empty").style.display = shown.length ? "none":"block";
  feed.innerHTML = shown.map((c,i)=>cardHtml(c, newFrom >= 0 && i >= newFrom)).join("");
  renderLoadZone(list.length);
}

function renderLoadZone(totalLen){
  const zone = document.getElementById("load-zone");
  const remaining = totalLen - visibleCount;
  if(totalLen === 0){ zone.innerHTML = ""; return; }
  if(remaining > 0){
    zone.innerHTML = `
      <button class="load-btn" id="load-more">
        載入更多案例 <span class="count">還有 ${remaining} 則</span>
      </button>`;
    document.getElementById("load-more").onclick = ()=>{
      const from = visibleCount;
      visibleCount += RUN.batchSize;
      render(from);
      const cards = document.querySelectorAll("#feed .card");
      if(cards[from]) cards[from].scrollIntoView({behavior:"smooth", block:"start"});
    };
  } else {
    zone.innerHTML = `
      <div class="load-done"><i></i>已瀏覽本輪全部 ${totalLen} 則・明日自動收集新一批</div>`;
  }
}

function renderRejected(){
  document.getElementById("rejected").innerHTML = REJECTED.map(c=>`
  <article class="card rejected">
    <div class="card-top">
      <div style="flex:1;min-width:250px">
        <h2 style="font-size:18.5px"><a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a></h2>
        <div class="meta">${esc(c.source)}</div>
        <div class="reject-reason">${esc(c.reason)}</div>
      </div>
      ${ringHtml(c.scores.reduce((a,b)=>a+b,0)+tierBonus[c.tier], false)}
    </div>
    <div class="actions">
      <a class="read-btn ghost" href="${esc(c.url)}" target="_blank" rel="noopener">閱讀原文${extIcon}</a>
      <details><summary>五維品質雷達</summary>${dimHtml(c)}</details>
    </div>
  </article>`).join("");
}

function init(){
  visibleCount = RUN.batchSize || 4;
  buildChips();
  renderRejected();
  render();
}

async function boot(){
  try{
    const r = await fetch("cases.json", {cache:"no-store"});
    if(r.ok){
      const j = await r.json();
      if(j && Array.isArray(j.cases)){
        CASES = j.cases;
        REJECTED = Array.isArray(j.rejected) ? j.rejected : [];
        if(j.updated) RUN.date = j.updated;
        if(j.run){ if(j.run.scanned!=null) RUN.scanned=j.run.scanned; if(j.run.candidates!=null) RUN.candidates=j.run.candidates; }
      }
    }
  }catch(e){ /* 本機 file:// 或離線：改用內建 fallback 資料 */ }
  document.getElementById("st-scanned").textContent = RUN.scanned;
  document.getElementById("st-candidates").textContent = RUN.candidates;
  document.getElementById("st-published").textContent = CASES.length;
  init();
  const sentinel = document.getElementById("toolbar-sentinel");
  if(window.IntersectionObserver && sentinel){
    new IntersectionObserver(([e])=>{
      document.getElementById("filters").classList.toggle("stuck", !e.isIntersecting);
    }, {threshold:0}).observe(sentinel);
  }
}
boot();
</script>
